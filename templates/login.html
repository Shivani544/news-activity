<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NewsPulse</title>
    <link id="mainStylesheet" rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h2>Welcome Back!</h2>
            <p>Login to access your NewsPulse dashboard</p>
        </div>
        
        <div class="form-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{{ 'error-message' if category == 'error' else 'success-message' }}">
                            <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' }}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a id="authSwitchLink" href="{{ url_for('signup') }}" data-fallback="signup.html">Sign up here</a></p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const stylesheet = document.getElementById('mainStylesheet');
            const authSwitchLink = document.getElementById('authSwitchLink');

            if (stylesheet && stylesheet.getAttribute('href') && stylesheet.getAttribute('href').includes('url_for(')) {
                stylesheet.setAttribute('href', '../static/style.css');
            }

            if (authSwitchLink && authSwitchLink.getAttribute('href') && authSwitchLink.getAttribute('href').includes('url_for(')) {
                authSwitchLink.setAttribute('href', authSwitchLink.getAttribute('data-fallback'));
            }
        })();

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
